<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><link rel="icon" type="image/png" href="icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:            #07070a;
  --bg-1:          #0b0b0f;
  --bg-2:          #101016;
  --bg-3:          #15151c;
  --bg-4:          #1a1a24;
  --bg-5:          #1f1f2d;

  --red:           #e63946;
  --red-hi:        #f04855;
  --red-mid:       #a82832;
  --red-lo:        #6b1c25;
  --red-xlo:       #3a0e15;

  --red-glow-xl:   rgba(230,57,70,0.18);
  --red-glow-lg:   rgba(230,57,70,0.13);
  --red-glow-md:   rgba(230,57,70,0.08);
  --red-glow-sm:   rgba(230,57,70,0.04);

  --border:        rgba(255,255,255,0.05);
  --border-md:     rgba(255,255,255,0.09);
  --border-red:    rgba(230,57,70,0.22);
  --border-red-hi: rgba(230,57,70,0.50);

  --text:          #e2e2ec;
  --text-muted:    #606074;
  --text-dim:      #34344a;

  --owner:         #f09458;
  --owner-bg:      rgba(240,148,88,0.10);
  --owner-border:  rgba(240,148,88,0.25);
  --staff:         #4ab882;
  --staff-bg:      rgba(74,184,130,0.10);
  --staff-border:  rgba(74,184,130,0.25);

  --font-display:  'Syne', sans-serif;
  --font-ui:       'Outfit', system-ui, sans-serif;
  --font-mono:     'JetBrains Mono', 'Fira Code', monospace;

  --radius-xs:     3px;
  --radius-sm:     5px;
  --radius-md:     9px;
  --radius-lg:     14px;

  --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
  --ease-spring:   cubic-bezier(0.34, 1.56, 0.64, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; color-scheme: dark; }
body {
  background-color: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── BACKGROUND ── */
.bg-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.bg-canvas::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  opacity: 0.5;
}
.bg-orb {
  position: absolute;
  border-radius: 50%;
}
.bg-orb-a {
  width: 700px; height: 400px;
  top: -160px; left: 10%;
  background: radial-gradient(ellipse, rgba(230,57,70,0.12) 0%, transparent 65%);
  filter: blur(80px);
  animation: drift-a 26s ease-in-out infinite alternate;
}
.bg-orb-b {
  width: 400px; height: 400px;
  bottom: 0; right: -80px;
  background: radial-gradient(ellipse, rgba(230,57,70,0.06) 0%, transparent 70%);
  filter: blur(70px);
  animation: drift-b 34s ease-in-out infinite alternate;
}
.bg-orb-c {
  width: 260px; height: 260px;
  top: 40%; left: -40px;
  background: radial-gradient(ellipse, rgba(230,57,70,0.04) 0%, transparent 70%);
  filter: blur(50px);
  animation: drift-c 20s ease-in-out infinite alternate;
}
.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(230,57,70,0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(230,57,70,0.022) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 80% 50% at 50% 0%, black 0%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 80% 50% at 50% 0%, black 0%, transparent 70%);
}
@keyframes drift-a {
  from { transform: translate(0,0) scale(1) rotate(-2deg); }
  to   { transform: translate(30px,20px) scale(1.08) rotate(2deg); }
}
@keyframes drift-b {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(-20px,-30px) scale(1.1); }
}
@keyframes drift-c {
  from { transform: translate(0,0); }
  to   { transform: translate(15px,-20px); }
}

/* ── SHELL ── */
#app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* ── TOPBAR ── */
.topbar {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(7,7,10,0.90);
  backdrop-filter: blur(20px) saturate(1.3);
  -webkit-backdrop-filter: blur(20px) saturate(1.3);
  position: sticky;
  top: 0;
  z-index: 300;
  gap: 14px;
  flex-shrink: 0;
}
.topbar::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--border-red) 30%, var(--border-red) 70%, transparent 100%);
  opacity: 0.4;
}
.topbar-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  flex-shrink: 0;
}
.brand-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 8px var(--red), 0 0 16px rgba(230,57,70,0.4);
  animation: pulse-dot 3s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulse-dot {
  0%, 100% { box-shadow: 0 0 6px var(--red), 0 0 12px rgba(230,57,70,0.3); }
  50%       { box-shadow: 0 0 10px var(--red), 0 0 22px rgba(230,57,70,0.5); }
}
.brand-name {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
  line-height: 1;
}
.brand-name em { color: var(--red); font-style: normal; }
.brand-tag {
  font-size: 10.5px;
  font-weight: 300;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.topbar-sep {
  width: 1px; height: 18px;
  background: var(--border-md);
  flex-shrink: 0;
}
.prefix-chip {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--red);
  background: var(--red-xlo);
  border: 1px solid var(--border-red);
  padding: 3px 10px;
  border-radius: var(--radius-xs);
  letter-spacing: 0.3px;
  flex-shrink: 0;
}
.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.count-pill {
  font-size: 11.5px;
  color: var(--text-muted);
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  padding: 3px 11px;
  border-radius: var(--radius-xs);
  white-space: nowrap;
}
.count-pill strong { color: var(--text); font-weight: 600; }

/* ── NAV BAR (replaces sidebar) ── */
.nav-bar {
  position: sticky;
  top: 52px;
  z-index: 200;
  background: rgba(7,7,10,0.88);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.nav-scroll {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 20px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  height: 46px;
  cursor: grab;
}
.nav-scroll:active { cursor: grabbing; }
.nav-scroll::-webkit-scrollbar { display: none; }

/* Fade edges to hint at overflow */
.nav-bar::before,
.nav-bar::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 32px;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.nav-bar::before {
  left: 0;
  background: linear-gradient(90deg, rgba(7,7,10,0.9), transparent);
}
.nav-bar::after {
  right: 0;
  background: linear-gradient(-90deg, rgba(7,7,10,0.9), transparent);
}
.nav-bar.fade-left::before { opacity: 1; }
.nav-bar.fade-right::after { opacity: 1; }

/* ── FILTER BAR (below search) ── */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

/* ── NAV PILL BASE ── */
.nav-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid transparent;
  background: transparent;
  font-family: var(--font-ui);
  font-size: 12.5px;
  font-weight: 400;
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s var(--ease-spring);
  position: relative;
  line-height: 1;
}
.nav-pill:hover {
  background: rgba(255,255,255,0.04);
  color: var(--text);
  border-color: var(--border);
}
.nav-pill.active {
  background: rgba(230,57,70,0.10);
  border-color: var(--border-red);
  color: var(--red);
  font-weight: 500;
}
.nav-pill:active { transform: scale(0.96); }

/* Filter pills (all/public/staff/owner) — slightly different size */
.nav-pill.filter-pill {
  padding: 4px 11px;
  font-size: 12px;
}

/* Count badge inside pill */
.pill-count {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  padding: 1px 5px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  color: var(--text-dim);
  border: 1px solid var(--border);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.nav-pill.active .pill-count {
  background: var(--red-xlo);
  color: var(--red-hi);
  border-color: var(--border-red);
}

/* Staff/owner tint */
.nav-pill.staff-pill { color: var(--staff); }
.nav-pill.staff-pill:hover { border-color: var(--staff-border); background: var(--staff-bg); }
.nav-pill.staff-pill.active { background: var(--staff-bg); border-color: var(--staff-border); color: var(--staff); }
.nav-pill.owner-pill { color: var(--owner); }
.nav-pill.owner-pill:hover { border-color: var(--owner-border); background: var(--owner-bg); }
.nav-pill.owner-pill.active { background: var(--owner-bg); border-color: var(--owner-border); color: var(--owner); }

/* Active indicator dot */
.nav-pill.filter-pill::before {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0;
  transition: opacity 0.15s;
}
.nav-pill.filter-pill.active::before { opacity: 1; }

/* ── MAIN ── */
.main { flex: 1; padding: 28px 40px 80px; }

/* ── SEARCH ── */
.search-wrap {
  position: relative;
  margin-bottom: 12px;
}
.search-icon-wrap {
  position: absolute;
  left: 15px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
  display: flex;
  transition: color 0.18s;
}
.search-wrap:focus-within .search-icon-wrap { color: var(--red); }
#search {
  width: 100%;
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 12px 120px 12px 44px;
  color: var(--text);
  font-size: 14px;
  font-family: var(--font-ui);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
#search::placeholder { color: var(--text-dim); }
#search:focus {
  border-color: var(--border-red);
  box-shadow: 0 0 0 3px rgba(230,57,70,0.06), 0 2px 12px rgba(0,0,0,0.3);
  background: rgba(230,57,70,0.015);
}
.search-right {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  display: flex;
  align-items: center;
  gap: 6px;
}
.search-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  transition: color 0.15s;
  white-space: nowrap;
}
.search-count.visible { color: var(--red); }
.search-kbd {
  font-size: 10px;
  color: var(--text-dim);
  background: var(--bg-3);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 3px;
  font-family: var(--font-mono);
  pointer-events: none;
  transition: opacity 0.15s;
}
#search:focus ~ .search-right .search-kbd { opacity: 0; }

/* ── CATEGORY SECTION ── */
.cat-section {
  margin-bottom: 52px;
  animation: section-in 0.4s var(--ease-out-expo) both;
}
.cat-section:last-child { margin-bottom: 0; }
@keyframes section-in {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.cat-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 22px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.cat-header::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--red), transparent);
  border-radius: 1px;
  animation: sweep-in 0.6s var(--ease-out-expo) both;
  animation-delay: inherit;
}
@keyframes sweep-in {
  from { width: 0; }
  to   { width: 56px; }
}
.cat-icon-wrap {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, var(--red-glow-xl) 0%, var(--red-glow-md) 60%, transparent 100%);
  border: 1px solid var(--border-red);
  border-radius: var(--radius-sm);
  font-size: 15px;
  flex-shrink: 0;
  box-shadow: 0 0 10px rgba(230,57,70,0.07), inset 0 1px 0 rgba(255,255,255,0.05);
}
.cat-name-group { display: flex; flex-direction: column; gap: 3px; }
.cat-title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
  line-height: 1.1;
}
.cat-desc {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 300;
  line-height: 1;
}
.cat-meta {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.cat-cmd-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
}
.cat-perm {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: var(--radius-xs);
}
.perm-owner { background: var(--owner-bg); color: var(--owner); border: 1px solid var(--owner-border); }
.perm-staff  { background: var(--staff-bg);  color: var(--staff);  border: 1px solid var(--staff-border); }

/* ── SECTION LABEL ── */
.sec-label {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 1.3px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin: 22px 0 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.sec-label::after {
  content: '';
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

/* ── GRID ── */
.cmd-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 7px;
}

/* ── CARD ──
   KEY FIX: No opacity/transform on base class.
   animation-fill-mode: both handles the from state.
   Stagger is capped per-section so cards never wait > 180ms. */
.cmd-card {
  background: linear-gradient(145deg, rgba(21,21,28,0.9) 0%, rgba(16,16,22,0.95) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 16px 12px;
  cursor: pointer;
  transition:
    border-color 0.2s,
    background 0.2s,
    transform 0.22s var(--ease-spring),
    box-shadow 0.2s;
  position: relative;
  overflow: hidden;
  user-select: none;
  will-change: transform;
  animation: card-in 0.35s var(--ease-out-expo) both;
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Shimmer on hover */
.cmd-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    transparent 40%,
    rgba(255,255,255,0.016) 50%,
    transparent 60%
  );
  opacity: 0;
  transform: translateX(-100%);
  pointer-events: none;
  transition: none;
}
/* Left accent bar */
.cmd-card::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 2px;
  background: linear-gradient(180deg, var(--red), var(--red-mid));
  opacity: 0;
  transition: opacity 0.18s;
  border-radius: var(--radius-md) 0 0 var(--radius-md);
}
.cmd-card:hover {
  border-color: var(--border-red);
  background: linear-gradient(145deg, rgba(26,26,36,0.95) 0%, rgba(21,21,28,0.98) 100%);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.35), 0 0 0 1px rgba(230,57,70,0.07);
}
.cmd-card:hover::before {
  opacity: 1;
  transform: translateX(100%);
  transition: opacity 0.25s, transform 0.65s;
}
.cmd-card:hover::after { opacity: 1; }
.cmd-card:active { transform: translateY(-1px); transition-duration: 0.1s; }

.cmd-card.copied {
  border-color: var(--staff-border);
  background: linear-gradient(145deg, rgba(74,184,130,0.06) 0%, rgba(16,16,22,0.98) 100%);
  box-shadow: 0 0 0 1px rgba(74,184,130,0.08);
}
.cmd-card.copied::after { background: var(--staff); opacity: 1; }

/* Card content */
.cmd-usage {
  font-family: var(--font-mono);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 7px;
  word-break: break-word;
  line-height: 1.6;
}
.cmd-usage .u-prefix { color: var(--red); font-weight: 600; }
.cmd-usage .u-name   { color: var(--text); }
.cmd-usage .u-args   { color: var(--text-muted); font-weight: 400; }
.cmd-usage .u-sep    { color: var(--text-dim); margin: 0 1px; }
.cmd-desc {
  font-size: 12.5px;
  color: var(--text-muted);
  line-height: 1.5;
  font-weight: 300;
}
.cmd-footer {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 10px;
  padding-top: 9px;
  border-top: 1px solid var(--border);
  min-height: 26px;
}
.cmd-badge {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 3px;
}
.alias-tag {
  font-family: var(--font-mono);
  font-size: 9.5px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  padding: 1.5px 6px;
  border-radius: 3px;
  color: var(--text-dim);
  transition: border-color 0.15s, color 0.15s;
}
.cmd-card:hover .alias-tag { border-color: rgba(255,255,255,0.08); color: var(--text-muted); }
.copy-btn {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--text-dim);
  opacity: 0;
  transition: opacity 0.15s, color 0.15s;
  pointer-events: none;
}
.cmd-card:hover .copy-btn { opacity: 1; }
.copy-btn.done { color: var(--staff); opacity: 1 !important; }

/* Ripple */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(230,57,70,0.09);
  transform: scale(0);
  animation: ripple-out 0.55s var(--ease-out-expo) forwards;
  pointer-events: none;
}
@keyframes ripple-out {
  to { transform: scale(5); opacity: 0; }
}

/* ── NO RESULTS ── */
.no-results {
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 100px 20px;
  gap: 10px;
}
.no-results.show { display: flex; }
.nr-icon {
  width: 52px; height: 52px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.nr-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; }
.nr-sub { font-size: 13px; color: var(--text-muted); font-weight: 300; }
.nr-sub strong { color: var(--text); font-weight: 500; }

/* ── SKELETON LOADER ── */
.loading-state {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 7px;
}
.skel-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 16px 12px;
  height: 100px;
  position: relative;
  overflow: hidden;
}
.skel-card::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
  animation: shim 1.8s ease-in-out infinite;
}
.skel-line { border-radius: 4px; background: rgba(255,255,255,0.04); }
.skel-line:first-child  { width: 50%; height: 11px; margin-bottom: 9px; }
.skel-line:nth-child(2) { width: 78%; height: 9px;  margin-bottom: 5px; opacity: 0.7; }
.skel-line:nth-child(3) { width: 60%; height: 9px;  opacity: 0.45; }
@keyframes shim {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--bg-5); }

/* ── RESPONSIVE ── */
@media (max-width: 620px) {
  .main { padding: 20px 16px 60px; }
  .cmd-grid { grid-template-columns: 1fr; }
  .topbar { padding: 0 14px; gap: 10px; }
  .nav-scroll { padding: 0 14px; }
  .brand-tag { display: none; }
  .topbar-sep { display: none; }
  .prefix-chip { display: none; }
  .count-pill { display: none; }
}

/* ── REDUCE MOTION ── */
@media (prefers-reduced-motion: reduce) {
  .bg-orb-a, .bg-orb-b, .bg-orb-c, .brand-dot { animation: none; }
  .cmd-card, .cat-section { animation: none; }
}
</style>
</head>
<body>

<div class="bg-canvas" aria-hidden="true">
  <div class="bg-orb bg-orb-a"></div>
  <div class="bg-orb bg-orb-b"></div>
  <div class="bg-orb bg-orb-c"></div>
  <div class="bg-grid"></div>
</div>

<div id="app">

  <header class="topbar">
    <a class="topbar-brand" href="#">
      <span class="brand-dot" aria-hidden="true"></span>
      <span class="brand-name"><em>xo</em></span>
      <span class="brand-tag">commands</span>
    </a>
    <div class="topbar-sep"></div>
    <span class="prefix-chip">prefix: .</span>
    <div class="topbar-right">
      <div class="count-pill" id="total-badge">loading</div>
    </div>
  </header>

  <!-- Horizontal scrollable nav bar — category pills only -->
  <div class="nav-bar" id="nav-bar">
    <div class="nav-scroll" id="nav-scroll">
      <!-- Category pills injected by JS -->
    </div>
  </div>

  <main class="main">
    <div class="search-wrap">
      <span class="search-icon-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input type="text" id="search" placeholder="Search commands, aliases, descriptions..." autocomplete="off" spellcheck="false" aria-label="Search commands">
      <span class="search-right">
        <span class="search-count" id="search-count"></span>
        <span class="search-kbd">/</span>
      </span>
    </div>

    <!-- Filter pills row below search -->
    <div class="filter-bar" id="filter-bar">
      <!-- Filter pills injected by JS -->
    </div>

    <div id="content">
      <div class="loading-state">
        <div class="skel-card"><div class="skel-line"></div><div class="skel-line"></div><div class="skel-line"></div></div>
        <div class="skel-card"><div class="skel-line"></div><div class="skel-line"></div><div class="skel-line"></div></div>
        <div class="skel-card"><div class="skel-line"></div><div class="skel-line"></div><div class="skel-line"></div></div>
        <div class="skel-card"><div class="skel-line"></div><div class="skel-line"></div><div class="skel-line"></div></div>
        <div class="skel-card"><div class="skel-line"></div><div class="skel-line"></div><div class="skel-line"></div></div>
        <div class="skel-card"><div class="skel-line"></div><div class="skel-line"></div><div class="skel-line"></div></div>
      </div>
    </div>

    <div class="no-results" id="no-results" role="status" aria-live="polite">
      <div class="nr-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </div>
      <div class="nr-title">Nothing found</div>
      <div class="nr-sub">No commands matched <strong id="no-results-query"></strong></div>
    </div>
  </main>

</div>

<script>
const DATA_URL = 'commands.json';

let allData = null;
let activeFilter = 'all';
let activeCat = 'all';
let searchQuery = '';

const CAT_ORDER = ['general','music','image','reactions','leveling','profile','theme','utility','fun','misc','vanity','staff','ai','admin'];
const SECTION_ORDER = {
  music: ['Playback','Controls','Music','Filters'],
};

function getOrderedCats(cats) {
  const known = CAT_ORDER.filter(id => cats[id]);
  const extra = Object.keys(cats).filter(id => !CAT_ORDER.includes(id));
  return [...known, ...extra];
}

function getOrderedSections(catId, sections) {
  const order = SECTION_ORDER[catId];
  if (!order) return Object.entries(sections);
  const ordered = order.filter(n => sections[n]).map(n => [n, sections[n]]);
  const extra = Object.entries(sections).filter(([n]) => !order.includes(n));
  return [...ordered, ...extra];
}

async function loadData() {
  try {
    const res = await fetch(DATA_URL);
    allData = await res.json();
    init();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<p style="color:var(--red);padding:80px 0;text-align:center;font-size:14px">Failed to load commands.json</p>';
  }
}

function init() {
  document.getElementById('total-badge').innerHTML =
    `<strong>${allData.total_commands}</strong> commands`;

  buildNav();
  setupSearch();
  setupScrollFade();
  render();
}

/* ── NAV BUILD ── */
function buildNav() {
  const scroll    = document.getElementById('nav-scroll');
  const filterBar = document.getElementById('filter-bar');

  // Filter pills — injected below the search bar
  const filters = [
    { key: 'all',    label: 'All' },
    { key: 'public', label: 'Public' },
    { key: 'staff',  label: 'Staff',  cls: 'staff-pill' },
    { key: 'owner',  label: 'Owner',  cls: 'owner-pill' },
  ];
  filters.forEach(({ key, label, cls }) => {
    const btn = document.createElement('button');
    btn.className = 'nav-pill filter-pill' + (cls ? ' ' + cls : '') + (key === 'all' ? ' active' : '');
    btn.dataset.filter = key;
    btn.textContent = label;
    btn.addEventListener('click', () => setFilter(key));
    filterBar.appendChild(btn);
  });

  // Category pills — nav-scroll bar only
  const allBtn = makeCatPill('all', gridIcon(), 'All', catCount('all'), true);
  scroll.appendChild(allBtn);

  getOrderedCats(allData.categories).forEach(id => {
    const cat = allData.categories[id];
    const btn = makeCatPill(id, cat.icon, cat.label, catCount(id), false);
    scroll.appendChild(btn);
  });
}

function makeCatPill(id, icon, label, count, active) {
  const btn = document.createElement('button');
  btn.className = 'nav-pill' + (active ? ' active' : '');
  btn.dataset.cat = id;
  btn.innerHTML = `${icon}<span>${escHtml(label)}</span><span class="pill-count">${count}</span>`;
  btn.addEventListener('click', () => setCat(id));
  return btn;
}

function gridIcon() {
  return `<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor" style="flex-shrink:0"><rect x="0" y="0" width="6" height="6" rx="1"/><rect x="10" y="0" width="6" height="6" rx="1"/><rect x="0" y="10" width="6" height="6" rx="1"/><rect x="10" y="10" width="6" height="6" rx="1"/></svg>`;
}

/* Scroll-fade hints + wheel scroll + click-drag */
function setupScrollFade() {
  const bar    = document.getElementById('nav-bar');
  const scroll = document.getElementById('nav-scroll');

  function update() {
    bar.classList.toggle('fade-left',  scroll.scrollLeft > 8);
    bar.classList.toggle('fade-right', scroll.scrollLeft < scroll.scrollWidth - scroll.clientWidth - 8);
  }
  scroll.addEventListener('scroll', update, { passive: true });
  setTimeout(update, 100);
  window.addEventListener('resize', update);

  // ── Wheel → horizontal scroll ──
  scroll.addEventListener('wheel', e => {
    if (e.deltaY === 0) return;
    e.preventDefault();
    scroll.scrollBy({ left: e.deltaY * 1.2, behavior: 'smooth' });
  }, { passive: false });

  // ── Click-drag to scroll ──
  let isDown    = false;
  let startX    = 0;
  let startLeft = 0;
  let dragged   = false;

  scroll.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    isDown    = true;
    dragged   = false;
    startX    = e.pageX;
    startLeft = scroll.scrollLeft;
    scroll.style.cursor = 'grabbing';
  });

  document.addEventListener('mousemove', e => {
    if (!isDown) return;
    const dx = e.pageX - startX;
    if (Math.abs(dx) > 4) dragged = true;
    if (dragged) scroll.scrollLeft = startLeft - dx;
    update();
  });

  document.addEventListener('mouseup', () => {
    if (!isDown) return;
    isDown = false;
    scroll.style.cursor = '';
    setTimeout(() => { dragged = false; }, 0);
  });

  // Swallow click only if we actually dragged
  scroll.addEventListener('click', e => {
    if (dragged) {
      e.preventDefault();
      e.stopImmediatePropagation();
    }
  }, true);
}

function setFilter(key) {
  activeFilter = key;
  document.querySelectorAll('.nav-pill.filter-pill').forEach(b =>
    b.classList.toggle('active', b.dataset.filter === key));
  render();
}

function setCat(id) {
  activeCat = id;
  searchQuery = '';
  document.getElementById('search').value = '';
  document.getElementById('search-count').textContent = '';
  document.getElementById('search-count').classList.remove('visible');
  document.querySelectorAll('.nav-pill[data-cat]').forEach(b =>
    b.classList.toggle('active', b.dataset.cat === id));
  // Scroll active pill into view
  const active = document.querySelector('.nav-pill[data-cat].active');
  if (active) active.scrollIntoView({ inline: 'nearest', block: 'nearest', behavior: 'smooth' });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setupSearch() {
  const searchEl = document.getElementById('search');
  const countEl  = document.getElementById('search-count');

  searchEl.addEventListener('input', e => {
    searchQuery = e.target.value.trim().toLowerCase();
    // Reset cat to all when searching
    activeCat = 'all';
    document.querySelectorAll('.nav-pill[data-cat]').forEach(b =>
      b.classList.toggle('active', b.dataset.cat === 'all'));
    render();
    if (searchQuery) {
      const n = countVisible();
      countEl.textContent = n + ' result' + (n !== 1 ? 's' : '');
      countEl.classList.add('visible');
    } else {
      countEl.textContent = '';
      countEl.classList.remove('visible');
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== searchEl) {
      e.preventDefault();
      searchEl.focus();
    }
    if (e.key === 'Escape') searchEl.blur();
  });
}

/* ── DATA HELPERS ── */
function catCount(catId) {
  if (catId === 'all') return allData.total_commands;
  const cat = allData.categories[catId];
  if (!cat) return 0;
  return Object.values(cat.sections).reduce((n, cmds) => n + cmds.length, 0);
}

function countVisible() {
  if (!allData) return 0;
  let total = 0;
  const cats = activeCat === 'all'
    ? getOrderedCats(allData.categories).map(id => [id, allData.categories[id]])
    : [[activeCat, allData.categories[activeCat]]].filter(([, v]) => v);
  cats.forEach(([, cat]) => {
    Object.values(cat.sections).forEach(cmds => {
      cmds.forEach(cmd => {
        if (passesFilter(cmd, cat.owner, cat.staff) && matchesSearch(cmd)) total++;
      });
    });
  });
  return total;
}

function passesFilter(cmd, catOwner, catStaff) {
  const isOwner = cmd.owner || catOwner;
  const isStaff = cmd.staff || catStaff;
  if (activeFilter === 'owner') return isOwner;
  if (activeFilter === 'staff') return isStaff;
  if (activeFilter === 'public') return !isOwner && !isStaff;
  return true;
}

function matchesSearch(cmd) {
  if (!searchQuery) return true;
  return (
    cmd.name.toLowerCase().includes(searchQuery) ||
    cmd.usage.toLowerCase().includes(searchQuery) ||
    cmd.description.toLowerCase().includes(searchQuery) ||
    (cmd.aliases || []).some(a => a.toLowerCase().includes(searchQuery))
  );
}

/* ── USAGE RENDERER ── */
function renderSingleToken(token) {
  const s = token.replace(/^`|`$/g, '').trim();
  if (!s.startsWith('.')) return escHtml(s);
  const sp = s.indexOf(' ');
  if (sp === -1) return `<span class="u-prefix">.</span><span class="u-name">${escHtml(s.slice(1))}</span>`;
  return `<span class="u-prefix">.</span><span class="u-name">${escHtml(s.slice(1,sp))}</span><span class="u-args">${escHtml(s.slice(sp))}</span>`;
}
function renderUsage(raw) {
  if (raw.includes(' · '))
    return raw.split(' · ').map(p => renderSingleToken(p.trim())).join('<span class="u-sep"> · </span>');
  return renderSingleToken(raw);
}

/* ── RENDER ──
   FIX: stagger resets per-section, max delay 180ms so no card ever
   stays invisible. animation-fill-mode:both (via CSS 'both') means
   the 'from' state is applied before the animation starts. */
function render() {
  const content   = document.getElementById('content');
  const noResults = document.getElementById('no-results');
  content.innerHTML = '';
  let totalRendered = 0;

  const cats = activeCat === 'all'
    ? getOrderedCats(allData.categories).map(id => [id, allData.categories[id]])
    : [[activeCat, allData.categories[activeCat]]].filter(([, v]) => v);

  const frag = document.createDocumentFragment();
  let secIdx = 0;

  cats.forEach(([catId, cat]) => {
    const catOwner = cat.owner;
    const catStaff = cat.staff;
    let catHasAny = false;
    const secNodes = [];
    let catCardCount = 0;

    getOrderedSections(catId, cat.sections).forEach(([secName, cmds]) => {
      const filtered = cmds.filter(cmd =>
        passesFilter(cmd, catOwner, catStaff) && matchesSearch(cmd));
      if (!filtered.length) return;
      catHasAny = true;
      totalRendered += filtered.length;

      const secDiv = document.createElement('div');
      const label  = document.createElement('div');
      label.className = 'sec-label';
      label.textContent = secName;
      secDiv.appendChild(label);

      const grid = document.createElement('div');
      grid.className = 'cmd-grid';

      filtered.forEach((cmd, i) => {
        const isOwner = cmd.owner || catOwner;
        const isStaff = cmd.staff || catStaff;

        let badge = '';
        if (isOwner)      badge = `<span class="cmd-badge perm-owner">owner</span>`;
        else if (isStaff) badge = `<span class="cmd-badge perm-staff">staff</span>`;

        const aliases = (cmd.aliases || []).slice(0, 3)
          .map(a => `<span class="alias-tag">.${escHtml(a)}</span>`).join('');

        const card = document.createElement('div');
        card.className = 'cmd-card';
        // Per-section stagger, max 180ms — cards are always visible fast
        const delay = Math.min(i * 22, 180);
        card.style.animationDelay = `${delay}ms`;
        catCardCount++;

        card.innerHTML = `
          <div class="cmd-usage">${renderUsage(cmd.usage)}</div>
          <div class="cmd-desc">${escHtml(cmd.description)}</div>
          <div class="cmd-footer">
            ${badge}${aliases}
            <span class="copy-btn" data-copy-btn>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              copy
            </span>
          </div>
        `;
        card.addEventListener('click', e => copyCmd(card, cmd.usage, e));
        grid.appendChild(card);
      });

      secDiv.appendChild(grid);
      secNodes.push(secDiv);
    });

    if (!catHasAny) return;

    const section = document.createElement('div');
    section.className = 'cat-section';
    section.id = 'cat-' + catId;
    section.style.animationDelay = `${secIdx * 55}ms`;
    secIdx++;

    let permBadge = '';
    if (catOwner)      permBadge = `<span class="cat-perm perm-owner">owner only</span>`;
    else if (catStaff) permBadge = `<span class="cat-perm perm-staff">staff only</span>`;

    const hdr = document.createElement('div');
    hdr.className = 'cat-header';
    hdr.innerHTML = `
      <div class="cat-icon-wrap">${escHtml(cat.icon)}</div>
      <div class="cat-name-group">
        <span class="cat-title">${escHtml(cat.label)}</span>
        ${cat.desc ? `<span class="cat-desc">${escHtml(cat.desc)}</span>` : ''}
      </div>
      <div class="cat-meta">
        <span class="cat-cmd-count">${catCardCount} cmd${catCardCount !== 1 ? 's' : ''}</span>
        ${permBadge}
      </div>
    `;

    section.appendChild(hdr);
    secNodes.forEach(n => section.appendChild(n));
    frag.appendChild(section);
  });

  content.appendChild(frag);

  const empty = totalRendered === 0;
  noResults.classList.toggle('show', empty);
  if (empty) {
    document.getElementById('no-results-query').textContent =
      `"${searchQuery || (activeFilter !== 'all' ? activeFilter : 'this filter')}"`;
  }
}

/* ── COPY ── */
function copyCmd(card, usage, e) {
  const text = usage.replace(/`/g, '').trim();
  navigator.clipboard.writeText(text).then(() => {
    if (e) {
      const rect = card.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const size = Math.max(card.offsetWidth, card.offsetHeight) * 1.6;
      ripple.style.cssText =
        `width:${size}px;height:${size}px;` +
        `left:${e.clientX - rect.left - size / 2}px;` +
        `top:${e.clientY - rect.top - size / 2}px;`;
      card.appendChild(ripple);
      setTimeout(() => ripple.remove(), 650);
    }

    card.classList.add('copied');
    const btn = card.querySelector('[data-copy-btn]');
    if (btn) {
      btn.innerHTML = `
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg> copied!`;
      btn.classList.add('done');
    }
    setTimeout(() => {
      card.classList.remove('copied');
      if (btn) {
        btn.innerHTML = `
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg> copy`;
        btn.classList.remove('done');
      }
    }, 1800);
  });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

loadData();
</script>
</body>
</html>
